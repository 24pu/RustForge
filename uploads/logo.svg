<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 90" width="340" height="90">
  <defs>
    <linearGradient id="rustGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a277ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d4cff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 左侧齿轮图标 -->
  <g transform="translate(50,45)">
    <!-- 外齿轮 -->
    <path d="M0 -26 L8 -22 L13 -28 L5 -36 L-5 -36 L-13 -28 L-8 -22 Z" fill="none" stroke="url(#rustGradient)" stroke-width="4" stroke-linejoin="round"/>
    <path d="M26 0 L22 8 L28 13 L36 5 L36 -5 L28 -13 L22 -8 Z" fill="none" stroke="url(#rustGradient)" stroke-width="4" stroke-linejoin="round"/>
    <path d="M0 26 L-8 22 L-13 28 L-5 36 L5 36 L13 28 L8 22 Z" fill="none" stroke="url(#rustGradient)" stroke-width="4" stroke-linejoin="round"/>
    <path d="M-26 0 L-22 -8 L-28 -13 L-36 -5 L-36 5 L-28 13 L-22 8 Z" fill="none" stroke="url(#rustGradient)" stroke-width="4" stroke-linejoin="round"/>
    <!-- 内圆 -->
    <circle cx="0" cy="0" r="18" fill="url(#rustGradient)"/>
    <!-- 字母 R -->
    <text x="0" y="7" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="20" fill="#ffffff" text-anchor="middle">R</text>
  </g>
  
  <!-- 右侧文字（紧凑间距） -->
  <text x="95" y="54" font-family="'Segoe UI', Arial, sans-serif" font-weight="bold" font-size="32" fill="#a277ff">Rust</text>
  <text x="174" y="54" font-family="'Segoe UI', Arial, sans-serif" font-weight="300" font-size="32" fill="#2d2d2d">Forge</text>
  
  <!-- 副标题（可选，可移除） -->
  <text x="95" y="72" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#a277ff" letter-spacing="1.5">ENTERPRISE WEB FRAMEWORK</text>
</svg>
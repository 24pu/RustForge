<div class="flex flex-col md:flex-row gap-6">
    <div id="user-center-nav"></div>
    <div class="flex-1 bg-white rounded shadow p-6">
        <h2 class="text-2xl font-bold mb-4">{{ change_password }}</h2>
        <form id="password-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium">{{ old_password }}</label>
                <input type="password" id="old_password" class="border rounded w-full p-2">
            </div>
            <div>
                <label class="block text-sm font-medium">{{ new_password }}</label>
                <input type="password" id="new_password" class="border rounded w-full p-2">
            </div>
            <div>
                <label class="block text-sm font-medium">{{ confirm_password }}</label>
                <input type="password" id="confirm_password" class="border rounded w-full p-2">
            </div>
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">{{ change_password }}</button>
        </form>
        <div id="password-message" class="mt-2 text-sm"></div>
    </div>
</div>
<script src="/plugins/user-center/static/nav-loader.js"></script>
<script>
    loadNav('password');
</script>
<script>
    const __t = (key, fallback) => (window.__plugin_locales__ && window.__plugin_locales__[key]) || fallback || key;

    document.getElementById('password-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const old_password = document.getElementById('old_password').value;
        const new_password = document.getElementById('new_password').value;
        const confirm = document.getElementById('confirm_password').value;
        if (new_password !== confirm) {
            document.getElementById('password-message').innerText = __t('password_mismatch', '两次输入的新密码不一致');
            return;
        }
        try {
            const res = await fetch('/api/me/password', {
                method: 'PUT',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ old_password, new_password })
            });
            const data = await res.json();
            const msgDiv = document.getElementById('password-message');
            if (res.ok) {
                msgDiv.className = 'text-green-600';
                msgDiv.innerText = __t('password_success', '密码修改成功，请重新登录');
                setTimeout(() => { window.location.href = '/admin/login.html'; }, 2000);
            } else {
                msgDiv.className = 'text-red-600';
                msgDiv.innerText = data.error || __t('change_failed', '修改失败');
            }
        } catch(err) {
            document.getElementById('password-message').innerText = __t('network_error', '网络错误');
        }
    });
</script>

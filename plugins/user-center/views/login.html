<div class="max-w-md mx-auto bg-white rounded shadow p-6">
    <h2 class="text-2xl font-bold mb-4">{{ login }}</h2>
    <form id="login-form" class="space-y-4">
        <div>
            <label class="block text-sm font-medium">{{ email }}</label>
            <input type="email" id="email" required class="border rounded w-full p-2">
        </div>
        <div>
            <label class="block text-sm font-medium">{{ password }}</label>
            <input type="password" id="password" required class="border rounded w-full p-2">
        </div>
        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded w-full">{{ login }}</button>
    </form>
    <div id="message" class="mt-2 text-sm text-center"></div>
    <p class="mt-4 text-center">
        {{ no_account }}
        <a href="/plugins/user-center/register" class="text-blue-600">{{ go_to_register }}</a>
    </p>
</div>
<script>
    const __t = (key, fallback) => (window.__plugin_locales__ && window.__plugin_locales__[key]) || fallback || key;

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (data.token) {
                localStorage.setItem('authToken', data.token);
                window.location.href = '/plugins/user-center/profile';
            } else {
                document.getElementById('message').innerText = data.error || __t('login_failed', 'ç™»ĺ˝•ĺ¤±č´Ą');
            }
        } catch (err) {
            document.getElementById('message').innerText = __t('network_error', 'ç˝‘ç»śé”™čŻŻ');
        }
    });
</script>
